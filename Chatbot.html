<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Effective Voice + Text Chatbot</title>
  <style>
    /* Reset some default browser styles */
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      color: #333;
    }

    .chat-container {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      padding: 20px 25px 30px;
    }

    h2 {
      font-weight: 700;
      font-size: 24px;
      color: #004085;
      margin-bottom: 20px;
      text-align: center;
      user-select: none;
    }

    #chatBox {
      flex-grow: 1;
      height: 350px;
      overflow-y: auto;
      padding: 15px 20px;
      border: 1px solid #d1d9e6;
      border-radius: 10px;
      background: #fefefe;
      font-size: 15px;
      line-height: 1.5;
      color: #222;
      white-space: pre-wrap;
      margin-bottom: 20px;
      scrollbar-width: thin;
      scrollbar-color: #007BFF #e4e7ec;
    }

    /* Custom scrollbar for WebKit browsers */
    #chatBox::-webkit-scrollbar {
      width: 8px;
    }
    #chatBox::-webkit-scrollbar-track {
      background: #e4e7ec;
      border-radius: 10px;
    }
    #chatBox::-webkit-scrollbar-thumb {
      background-color: #007BFF;
      border-radius: 10px;
    }

    #chatBox div {
      margin-bottom: 12px;
      padding: 8px 14px;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
    }

    #chatBox .you {
      background-color: #cde6ff;
      color: #003366;
      align-self: flex-end;
      font-weight: 600;
      text-align: right;
      box-shadow: 1px 2px 6px rgba(0, 0, 0, 0.07);
    }

    #chatBox .bot {
      background-color: #e9f0ff;
      color: #004085;
      align-self: flex-start;
      font-weight: 700;
      box-shadow: 1px 2px 6px rgba(0, 0, 0, 0.07);
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    #inputBox {
      flex-grow: 1;
      padding: 12px 15px;
      font-size: 16px;
      border: 1.8px solid #ced4da;
      border-radius: 8px;
      transition: border-color 0.3s ease;
      outline-offset: 0;
      outline: none;
      box-shadow: inset 1px 1px 4px #f0f2f5;
    }
    #inputBox:focus {
      border-color: #007BFF;
      box-shadow: 0 0 8px rgba(0, 123, 255, 0.4);
    }

    button {
      background-color: #007BFF;
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 123, 255, 0.4);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      user-select: none;
    }
    button:hover {
      background-color: #0056b3;
      box-shadow: 0 6px 14px rgba(0, 86, 179, 0.6);
    }
    button:active {
      background-color: #004494;
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    /* Responsive adjustments */
    @media (max-width: 520px) {
      body {
        padding: 20px 10px;
      }
      .chat-container {
        max-width: 100%;
        padding: 15px 20px 25px;
      }
      #chatBox {
        height: 280px;
        font-size: 14px;
      }
      #inputBox, button {
        font-size: 14px;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>

<div class="chat-container">
  <h2>Chatbot</h2>
  <div id="chatBox"></div>
  <div class="input-area">
    <input type="text" id="inputBox" placeholder="Type your message..." autocomplete="off" />
    <button onclick="sendText()">Send</button>
    <button onclick="startListening()" title="Speak">🎤</button>
  </div>
</div>

<script>
  // Speech Recognition setup
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-IN";
  recognition.continuous = false;

  let userName = "";

  recognition.onresult = function(event) {
    let text = event.results[0][0].transcript;
    processInput(text);
  };

  function startListening() {
    recognition.start();
  }

  // Add message to chat box
  function addMessage(sender, text) {
    const chatBox = document.getElementById("chatBox");
    const msg = document.createElement("div");
    msg.classList.add(sender.toLowerCase());
    msg.innerHTML = `<strong>${sender}:</strong> ${text}`;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // Bot starts conversation on page load
  window.onload = () => {
    const greeting = "Hello! What is your name?";
    addMessage("Bot", greeting);
    speak(greeting);
  };

  // Handle sending text input
  function sendText() {
    const inputBox = document.getElementById("inputBox");
    let text = inputBox.value.trim();
    if (text === "") return;
    processInput(text);
    inputBox.value = "";
  }

  // Process user input
  function processInput(text) {
    addMessage("You", text);

    let reply = getReply(text.toLowerCase());

    setTimeout(() => {
      addMessage("Bot", reply);
      speak(reply);
    }, 500);
  }

  // Basic AI logic for replies
  function getReply(msg) {
    if (msg.includes("my name is")) {
      userName = msg.split("my name is")[1].trim();
      return `Nice to meet you, ${userName}! How can I assist you today?`;
    }

    if (!userName) {
      userName = msg.trim();
      return `Nice to meet you, ${userName}! How can I assist you today?`;
    }

    if (msg.includes("how are you")) {
      return `I'm doing great, ${userName}! What can I do for you?`;
    }

    if (msg.includes("ai")) {
      return "AI stands for Artificial Intelligence, making machines smart!";
    }

    if (msg.includes("bye") || msg.includes("exit") || msg.includes("quit")) {
      return `Goodbye ${userName}! Have a great day! 👋`;
    }

    return "Tell me more or ask me anything!";
  }

  // Text to speech function
  function speak(text) {
    speechSynthesis.cancel();
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-IN";
    speech.rate = 1;
    speechSynthesis.speak(speech);
  }
</script>

</body>
</html>
